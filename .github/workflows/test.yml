name: Test & Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests with Coverage
        run: npm run test:unit:coverage

      - name: Run Integration Tests
        run: npm run test:integration

      - name: Merge Reports
        run: npm run test:report:merge

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: tests/reports/
          retention-days: 30

      - name: Comment PR with Test Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let coveragePct = 'N/A';
            let unitTestsPassed = 0;
            let unitTestsFailed = 0;
            
            try {
              const coverage = JSON.parse(fs.readFileSync('tests/reports/coverage/coverage-summary.json'));
              coveragePct = coverage.total.lines.pct + '%';
            } catch (e) {
              console.log('Could not read coverage summary');
            }
            
            try {
              const junitContent = fs.readFileSync('tests/reports/unit/junit.xml', 'utf8');
              const matches = junitContent.match(/tests="(\d+)"/g);
              if (matches) {
                const totalTests = matches.reduce((sum, match) => sum + parseInt(match.match(/\d+/)[0]), 0);
                const failures = (junitContent.match(/failures="(\d+)"/g) || [])
                  .reduce((sum, match) => sum + parseInt(match.match(/\d+/)[0]), 0);
                unitTestsPassed = totalTests - failures;
                unitTestsFailed = failures;
              }
            } catch (e) {
              console.log('Could not read unit test results');
            }
            
            const statusEmoji = unitTestsFailed === 0 ? '✅' : '❌';
            const coverageEmoji = coveragePct !== 'N/A' && parseInt(coveragePct) >= 80 ? '✅' : '⚠️';
            
            const comment = `## 🧪 测试报告
            
            ### 单元测试
            ${statusEmoji} **${unitTestsPassed}** 通过, **${unitTestsFailed}** 失败
            
            ### 代码覆盖率
            ${coverageEmoji} **行覆盖率:** ${coveragePct}
            
            ---
            
            📊 [查看详细测试报告](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            *Generated by GitHub Actions*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check Coverage Threshold
        run: |
          node -e "
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('tests/reports/coverage/coverage-summary.json'));
            const lineCoverage = coverage.total.lines.pct;
            
            if (lineCoverage < 60) {
              console.error(\`❌ Coverage too low: \${lineCoverage}% (minimum: 60%)\`);
              process.exit(1);
            }
            
            console.log(\`✅ Coverage check passed: \${lineCoverage}%\`);
          "

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting (if configured)
        run: |
          if [ -f "package.json" ]; then
            if grep -q '"lint"' package.json; then
              npm run lint
            else
              echo "No lint script found in package.json"
            fi
          fi
        continue-on-error: true
